<text x="765.0" y="597.0" font-size="17" font-weight="700" fill="#222" text-anchor="middle">30.4 g</text>
<rect x="40" y="654" width="860" height="118" rx="10" fill="#ffffff" stroke="#cde0c6"/>
<text x="62" y="686" font-size="18" font-weight="700" fill="#2e7d32">Formule</text>
<text x="62" y="716" font-size="16" fill="#333">grammes = g/L (pleine force) × litres × (EC désiré − EC initial) ÷ EC pleine force</text>
<text x="62" y="744" font-size="15" fill="#666">Sulfate Mg = moitié du Masterblend • Nitrate Ca = égal au Masterblend • ΔEC ≤ 0 → rien à ajouter.</text>
<text x="40" y="810" font-size="13" fill="#999">Généré par outils/calcul_nutriments.py — EC initial fourni en argument.</text>
</svg>