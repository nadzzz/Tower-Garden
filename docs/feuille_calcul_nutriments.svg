<text x="75.0" y="597.0" font-size="17" font-weight="700" fill="#222" text-anchor="middle">T3</text>
<text x="155.0" y="597.0" font-size="17" font-weight="400" fill="#222" text-anchor="middle">0.77</text>
<text x="245.0" y="597.0" font-size="17" font-weight="400" fill="#222" text-anchor="middle">2.15</text>
<text x="330.0" y="597.0" font-size="17" font-weight="400" fill="#222" text-anchor="middle">1.38</text>
<text x="455.0" y="597.0" font-size="17" font-weight="700" fill="#222" text-anchor="middle">30.4 g</text>
