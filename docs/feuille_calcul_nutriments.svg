<svg xmlns="http://www.w3.org/2000/svg" width="940" height="880" viewBox="0 0 940 880" font-family="Segoe UI, Arial, sans-serif">
<rect width="940" height="880" fill="#f7faf5"/>
<rect x="0" y="0" width="940" height="92" fill="#2e7d32"/>
<text x="40" y="46" fill="#ffffff" font-size="30" font-weight="700">Feuille de calcul des nutriments — Tower Garden</text>
<text x="40" y="76" fill="#d7f0d2" font-size="17">Masterblend (Gecko Grow) • ratio 2:1:2 • EC en µS/cm • ajout ou dilution selon l’écart</text>
<rect x="40" y="128" width="860" height="186" rx="10" fill="#ffffff" stroke="#cde0c6"/>
<text x="62" y="162" font-size="20" font-weight="700" fill="#2e7d32">Recette de base (étiquette)</text>
<text x="62" y="194" font-size="16" fill="#333">1. Dissoudre le Part 1 (Masterblend) ET le Part 2 (sulfate de magnésium) dans l’eau tiède.</text>
<text x="62" y="220" font-size="16" fill="#333">2. Ajouter le Part 3 (nitrate de calcium) EN DERNIER, une fois les deux premiers bien dissous.</text>
<text x="62" y="246" font-size="16" fill="#333">Plage de pH (hydroponie) : 5.5 – 6.5.</text>
<text x="62" y="272" font-size="16" fill="#333">Ne jamais mélanger les concentrés secs ensemble (risque de blocage des nutriments).</text>
<rect x="62" y="256" width="258" height="34" rx="17" fill="#2e7d32"/>
<text x="78" y="279" font-size="15" fill="#fff" font-weight="600">Part 1 – Masterblend : 0,64 g/L (pleine force)</text>
<rect x="332" y="256" width="258" height="34" rx="17" fill="#00796b"/>
<text x="348" y="279" font-size="15" fill="#fff" font-weight="600">Part 2 – Sulfate Mg : 0,32 g/L (pleine force)</text>
<rect x="602" y="256" width="258" height="34" rx="17" fill="#ef6c00"/>
<text x="618" y="279" font-size="15" fill="#fff" font-weight="600">Part 3 – Nitrate Ca : 0,64 g/L (pleine force)</text>
<text x="40" y="350" font-size="22" font-weight="700" fill="#2e7d32">Action par tour</text>
<text x="40" y="376" font-size="15" fill="#555">Réservoir 20 gal US = 75.7 L • EC en µS/cm • pleine force = 2.48 mS/cm • eau de base = 241 µS/cm</text>
<rect x="40" y="400" width="800" height="56" fill="#2e7d32"/>
<text x="75.0" y="424" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">Tour</text>
<text x="165.0" y="422" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">EC actuel</text>
<text x="165.0" y="440" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">(µS)</text>
<text x="275.0" y="422" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">EC cible</text>
<text x="275.0" y="440" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">(µS)</text>
<text x="346" y="424" font-size="14" font-weight="700" fill="#fff" text-anchor="start">À faire</text>
<rect x="40" y="456" width="800" height="70" fill="#fdecea" stroke="#e0e8db"/>
<text x="75" y="497.0" font-size="20" font-weight="700" fill="#222" text-anchor="middle">T1</text>
<text x="165" y="497.0" font-size="18" fill="#222" text-anchor="middle">2774</text>
<text x="275" y="497.0" font-size="18" fill="#222" text-anchor="middle">1100</text>
<text x="346" y="486" font-size="15" font-weight="700" fill="#c62828">DILUER</text>
<text x="430" y="486" font-size="15" fill="#333">retirer 50.0 L → remplacer par eau fraîche</text>
<rect x="40" y="526" width="800" height="70" fill="#fdecea" stroke="#e0e8db"/>
<text x="75" y="567.0" font-size="20" font-weight="700" fill="#222" text-anchor="middle">T2</text>
<text x="165" y="567.0" font-size="18" fill="#222" text-anchor="middle">3952</text>
<text x="275" y="567.0" font-size="18" fill="#222" text-anchor="middle">1650</text>
<text x="346" y="556" font-size="15" font-weight="700" fill="#c62828">DILUER</text>
<text x="430" y="556" font-size="15" fill="#333">retirer 47.0 L → remplacer par eau fraîche</text>
<rect x="40" y="596" width="800" height="70" fill="#fdecea" stroke="#e0e8db"/>
<text x="75" y="637.0" font-size="20" font-weight="700" fill="#222" text-anchor="middle">T3</text>
<text x="165" y="637.0" font-size="18" fill="#222" text-anchor="middle">4784</text>
<text x="275" y="637.0" font-size="18" fill="#222" text-anchor="middle">2150</text>
<text x="346" y="626" font-size="15" font-weight="700" fill="#c62828">DILUER</text>
<text x="430" y="626" font-size="15" fill="#333">retirer 43.9 L → remplacer par eau fraîche</text>
<rect x="40" y="696" width="860" height="120" rx="10" fill="#ffffff" stroke="#cde0c6"/>
<text x="62" y="726" font-size="18" font-weight="700" fill="#2e7d32">Formules</text>
<text x="62" y="754" font-size="15" fill="#333">Ajout : grammes = g/L (pleine force) × litres × (EC cible − EC actuel) ÷ EC pleine force</text>
<text x="62" y="778" font-size="15" fill="#333">Dilution : litres à retirer = volume × (EC actuel − EC cible) ÷ (EC actuel − EC eau de base)</text>
<text x="62" y="802" font-size="14" fill="#666">Sulfate Mg = moitié du Masterblend • Nitrate Ca = égal au Masterblend</text>
<text x="40" y="858" font-size="13" fill="#999">Généré par outils/calcul_nutriments.py — EC actuelle fournie en argument (µS/cm, ou --ppm).</text>
</svg>